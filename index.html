<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="assets/scss/reset.css" />
  <link rel="stylesheet" href="assets/scss/style.css" />
  <title>responsive-site</title>
</head>
<body>
  <header class="l-header">
    <img class="c-img--headerLogo" src="assets/img/logo.png" alt="ロゴ">
    <div class="p-headerMenu">
      <a class="c-btn--header" src="#">お問い合わせ</a>
      <button class="p-hamburgerMenu js-menu-open" type="button">
        <div class="c-line u-marginBottom"></div>
        <div class="c-line u-marginBottom"></div>
        <div class="c-line"></div>
      </button>
      <nav class="p-hamburgerMenu__body js-menu-content">
        <div class="p-hamburgerMenu__header">
          <img class="c-img--headerLogo -hamburgerMenu" src="assets/img/logo.png" alt="ロゴ">
          <button class="c-btn--close js-menu-close">×</button>
        </div>
        <ul class="p-hamburgerMenu__list">
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">トップ</a></li>
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">サービス・メニュー</a></li>
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">料金</a></li>
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">スタッフ紹介</a></li>
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">アクセス</a></li>
          <li class="p-hamburgerMenu__item"><a class="c-link" href="#">about</a></li>
        </ul>
        <div class="p-hamburgerMenu__footer">
          <div class="p-hamburgerMenu__contactWrap">
            <a class="c-btn--contact" href="#">お問い合わせ →</a>
          </div>
          <a class="c-btn--footer" href="#">よくある質問</a>
          <a class="c-btn--footer" href="#">店舗一覧</a>
        </div>
      </nav>
    </div>
  </header>
  <main class="l-main">
    <div class="p-title">
      <p class="c-text--title">料金シミュレーター</p>
      <h1 class="c-text--mainTitle">あなたに合ったコースを簡単診断</h1>
      <p class="c-text--titleContents">気になるお悩みやご希望に合わせて、<br>最適なコースと料金をシミュレーションできます。</p>
    </div>
    <section class="p-stepWrap"> <!---プランを選択--->
      <div class="p-step">
        <p class="c-text--number u-marginRight10">1</p>
        <p class="c-text--plan">プランを選ぶ</p>
      </div>
      <label class="p-planBox" data-plan="light" data-price="110000"> <!---ライトプラン--->
        <p class="c-text--planSection">ライトプラン</p>
        <p class="c-text--planText">手軽な施術を定期的に続けたい方に</p>
        <div class="p-price">
          <p class="c-text--course">¥<span class="c-text--price">110,000</span>（10回コース）</p>
          <p class="c-text--taxIn">（税込121,000円）</p>
        </div>
        <div class="p-plan__detailWrap">
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">1回につき45分整体施術</p>
          </div>
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">フォトフェイシャル20分（10回中3回）</p>
          </div>
        </div>
      </label>
      <div class="p-planBox__recommendedWrap">
        <span class="c-text--recommended">おすすめ</span>
      </div>
      <label class="p-planBox" data-plan="standard" data-price="160,000"> <!---スタンダードプラン--->
        <p class="c-text--planSection">スタンダードプラン</p>
        <p class="c-text--planText">整体＋美容で、内側からキレイになりたい方に</p>
        <div class="p-price">
          <p class="c-text--course">¥<span class="c-text--price">160,000</span>（16回コース）</p>
          <p class="c-text--taxIn">（税込176,000円）</p>
        </div>
        <div class="p-plan__detailWrap">
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">1回につき60分整体施術</p>
          </div>
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">フォトフェイシャル20分（16回中6回）</p>
          </div>
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">美容鍼（部位：顔　16回中7回）</p>
          </div>
          <div class="p-plan__detail -campaign">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents -campaign">今だけ！<br>◎初回体験無料（通常5,000円）<br>◎充電式ホットアイマスクプレゼント<br>（～2026年7月末）</p>
          </div>
        </div>
      </label>
      <label class="p-planBox" data-plan="premium" data-price="228,000"> <!---プレミアムプラン--->
        <p class="c-text--planSection">プレミアムプラン</p>
        <p class="c-text--planText">体の根本から変えて、理想の自分へ近づきたい方に</p>
        <div class="p-price">
          <p class="c-text--course">¥<span class="c-text--price">228,000</span>（21回コース）</p>
          <p class="c-text--taxIn">（税込250,800円）</p>
        </div>
        <div class="p-plan__detailWrap">
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">1回につき90分整体施術</p>
          </div>
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">フォトフェイシャル20分（21回中10回）</p>
          </div>
          <div class="p-plan__detail">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents">美容鍼（部位：顔　21回中11回）</p>
          </div>
          <div class="p-plan__detail -campaign">
            <p class="c-text--check">✓</p>
            <p class="c-text--detailContents -campaign">6月キャンペーン<br>◎上記のお値段から10％OFF<br>◎オリジナルスキンケアセットプレゼント<br>（～2026年6月末）</p>
          </div>
        </div>
      </label>
    </section>
    <section class="p-stepWrap__frequency"> <!---頻度を選択--->
      <div class="p-step">
        <p class="c-text--number u-marginRight10">2</p>
        <p class="c-text--plan">通う頻度を選ぶ</p>
      </div>
      <div class="p-frequencyBox__wrap">
        <label class="p-frequencyBox" data-frequency="weekly">
          <p class="c-text--planSection">週1回</p>
          <p class="c-text--planText -frequency">短期集中ケアに</p>
        </label>
        <label class="p-frequencyBox" data-frequency="biweekly">
          <p class="c-text--planSection">月2回</p>
          <p class="c-text--planText -frequency">定期メンテナンスに</p>
        </label>
        <label class="p-frequencyBox" data-frequency="monthly">
          <p class="c-text--planSection">月1回</p>
          <p class="c-text--planText -frequency">マイペースに継続</p>
        </label>
      </div>
      <p class="c-text--recommendedFrequency">週1回～月2回の通院で<br>効果を実感しやすくなります</p>
    </section>
    <section class="p-stepWrap"> <!---オプションを選択--->
      <div class="p-step">
        <p class="c-text--number u-marginRight10">3</p>
        <p class="c-text--plan">オプションを選ぶ</p>
      </div>
      <label class="p-optionBox">
        <input type="checkbox" class="p-optionBox__input">
        <span class="p-optionBox__check"></span>
        <div class="p-option">
          <p class="c-text--optionMenu">整体施術60分</p>
          <p class="c-text--optionPrice">¥6,600</p>
        </div>
      </label>
      <label class="p-optionBox">
        <input type="checkbox" class="p-optionBox__input">
        <span class="p-optionBox__check"></span>
        <div class="p-option">
          <p class="c-text--optionMenu">整体施術30分延長</p>
          <p class="c-text--optionPrice">¥3,300</p>
        </div>
      </label>
      <label class="p-optionBox">
        <input type="checkbox" class="p-optionBox__input">
        <span class="p-optionBox__check"></span>
        <div class="p-option">
          <p class="c-text--optionMenu">フォトフェイシャル20分</p>
          <p class="c-text--optionPrice">¥9,900</p>
        </div>
      </label>
      <label class="p-optionBox">
        <input type="checkbox" class="p-optionBox__input">
        <span class="p-optionBox__check"></span>
        <div class="p-option">
          <p class="c-text--optionMenu">美容鍼</p>
          <p class="c-text--optionPrice">¥5,500</p>
        </div>
      </label>
      <label class="p-optionBox">
        <input type="checkbox" class="p-optionBox__input">
        <span class="p-optionBox__check"></span>
        <div class="p-option">
          <p class="c-text--optionMenu">オプションなし</p>
          <p class="c-text--optionPrice">¥0</p>
        </div>
      </label>
    </section>
    <div class="p-resultWrap">
      <div class="p-resultTitle">
        <p class="c-text--result">SIMULATION RESULT</p>
        <p class="c-text--resultJp">料金シミュレーション結果</p>
      </div>
    </div>
  </main>
  <script src="assets/js/script.js"></script>
</body>

</html>
